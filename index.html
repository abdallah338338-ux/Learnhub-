<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub | منصتك التعليمية الشخصية</title>
    <meta name="description" content="LearnHub - منصتك التعليمية الشخصية لتنظيم مواضيعك وملفاتك وملاحظاتك ومتابعة تقدمك في مكان واحد.">
    <meta name="keywords" content="LearnHub, Learnhub, تعلم, تعليم, تنظيم الدراسة, ملاحظات, ملفات تعليمية">
    <meta name="author" content="LearnHub">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="googlebot" content="index, follow">
    <link rel="canonical" href="https://abdallah338338-ux.github.io/Learnhub-/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LearnHub">
    <meta property="og:title" content="LearnHub | منصتك التعليمية الشخصية">
    <meta property="og:description" content="نظّم مواضيعك وملفاتك وملاحظاتك وتابع تقدمك مع LearnHub.">
    <meta property="og:url" content="https://abdallah338338-ux.github.io/Learnhub-/">
    <meta property="og:image" content="https://abdallah338338-ux.github.io/Learnhub-/hero-character.png">
    <meta property="og:locale" content="ar_EG">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LearnHub | منصتك التعليمية الشخصية">
    <meta name="twitter:description" content="نظّم مواضيعك وملفاتك وملاحظاتك وتابع تقدمك مع LearnHub.">
    <meta name="twitter:image" content="https://abdallah338338-ux.github.io/Learnhub-/hero-character.png">
    <meta name="theme-color" content="#FF8A3D">
    <link rel="icon" type="image/x-icon" href="favicon.ico.png">
    <link rel="shortcut icon" href="favicon.ico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Navbar موحّد - ظاهر دايمًا في كل الصفحات ===== -->
  <nav class="navbar container">
    <div class="logo"><span class="cap">🎓</span>Learn<span class="hub">Hub</span></div>
    <div class="nav-links">
  <a href="#" class="active" id="homeLink">🏠 الرئيسية</a>
  <a href="#">▦ المواضيع</a>
    </div>
    <div class="search">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن أي شيء...">
    </div>
    <div> </div>
    <div class="nav-right">
      <div class="view-toggle">
        <button id="gridBtn" class="active">▦</button>
        <button id="listBtn">☰</button>
      </div>
      <span class="divider"></span>
      <div id="authArea" class="auth-area">
  <button id="loginBtn" class="btn-login" > Sign in   Google  </button>

  <div id="userInfo" class="user-info hidden">
    <img id="userPhoto" class="user-photo" src="" alt="">
    <span id="userName" class="user-name"></span>
    <button id="logoutBtn" class="btn-logout" title="تسجيل الخروج">⏻</button>
  </div>
</div>
    </div>
  </nav>

  <!-- ===== Hero - يظهر بس في الرئيسية ===== -->
  <section class="hero container" id="heroSection">
    <div class="hero-text">
      <p class="welcome">   WELCOME   <span class="name">ABDALLAH </span> 👋</p>
      <h1 class="headline">   LET'S TO<span class="accent">Work.</span></h1>
      <p class="subtitle"> Organize your topics, save what matters, and track your progress — all in one place.</p>
      <div class="cta-row">
        <button class="btn-primary" id="getStartedBtn">🚀 Get Started</button>
      </div>
    </div>

    <div class="hero-art">
      <div class="blob"></div>
      <div class="dots dots-top"></div>
      <div class="dots dots-bottom"></div>
      <div class="character-slot">
        <img src="hero-character.png" alt="Character" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="character-placeholder" style="display:none;">
          حط صورة الكاركتر هنا<br>باسم: hero-character.png
        </div>
      </div>
    </div>
  </section>

  <!-- ===== منطقة المحتوى - نفس الحاوية بنفس المسافات دايمًا ===== -->
  <div class="container app-area">
    <div class="breadcrumb" id="breadcrumb"></div>
    <main id="mainArea" class="grid-view" aria-label="محتوى LearnHub"></main>
  </div>

  <!-- مساحة فاضية ثابتة آخر الصفحة -->
  <div class="page-end-spacer"></div>

  <button id="addBtn" class="fab">+</button>

  <!-- قائمة اضافة عنصر -->
  <div id="addMenu" class="popup-menu hidden">
    <button data-type="folder">📂 مجلد جديد</button>
    <button data-type="file">📄 ملف / PDF</button>
    <button data-type="video">🎥 فيديو</button>
    <button data-type="link">🔗 رابط</button>
    <button data-type="note">📝 ملاحظة</button>
  </div>

<div id="topicModal" class="modal hidden">
  <div class="modal-box">
    <h3>موضوع جديد</h3>
    <input type="text" id="topicNameInput" placeholder="اسم الموضوع">

    <p class="modal-label">اختر أيقونة مناسبة</p>
    <div class="icon-picker">
      <span data-icon="💻" class="selected">💻</span>
      <span data-icon="🏗">🏗</span>
      <span data-icon="📚">📚</span>
      <span data-icon="🎨">🎨</span>
      <span data-icon="🧠">🧠</span>
      <span data-icon="📈">📈</span>
      <span data-icon="🌐">🌐</span>
      <span data-icon="🔬">🔬</span>
      <span data-icon="⚖️">⚖️</span>
      <span data-icon="🎵">🎵</span>
      <span data-icon="📷">📷</span>
      <span data-icon="📁">📁</span>
    </div>

    <p class="modal-label">اختر لون</p>
    <div class="color-picker">
      <span data-color="#FF8A3D" style="background:#FF8A3D"></span>
      <span data-color="#3b82f6" style="background:#3b82f6"></span>
      <span data-color="#10b981" style="background:#10b981"></span>
      <span data-color="#ef4444" style="background:#ef4444"></span>
      <span data-color="#8b5cf6" style="background:#8b5cf6"></span>
    </div>
    <div class="modal-actions">
      <button id="topicCancel">إلغاء</button>
      <button id="topicSave">إنشاء</button>
    </div>
  </div>
</div>
<div id="itemModal" class="modal hidden">

  <div class="modal-box">
    <h3 id="itemModalTitle">عنصر جديد</h3>
    <input type="text" id="itemNameInput" placeholder="الاسم">
    <input type="text" id="itemLinkInput" placeholder="رابط (اختياري)" class="hidden">

  <div id="fileInputWrapper" class="hidden">
  <label for="itemFileInput" class="file-drop-label">
    📁 اضغط هنا لاختيار ملف من جهازك
  </label>
  <input type="file" id="itemFileInput">
  <p id="fileNamePreview" class="file-name-preview"></p>

  <div id="uploadProgressWrapper" class="upload-progress-wrapper hidden">
    <div id="uploadProgressBar" class="upload-progress-bar"></div>
  </div>
  <p id="uploadProgressText" class="upload-progress-text"></p>
</div>

    <div class="modal-actions">
      <button id="itemCancel">إلغاء</button>
      <button id="itemSave">إضافة</button>
    </div>
  </div>
</div>
 
 <div id="contextMenu" class="popup-menu hidden">
  <button id="ctxRename">✏️ إعادة تسمية</button>
  <button id="ctxDuplicate">📑 تكرار</button>
  <button id="ctxFavorite">⭐ تفضيل</button>
  <button id="ctxDelete" class="danger">🗑 حذف</button>
</div>

<!-- نافذة معاينة الملفات -->
<div id="previewModal" class="preview-modal hidden">
  <div class="preview-header">
    <span id="previewTitle" class="preview-title"></span>
   <div class="preview-actions">
  <button id="previewOpenBtn" class="preview-btn">⤢ فتح كامل</button>
  <button id="previewDownloadBtn" class="preview-btn">⬇ تحميل</button>
  <button id="previewCloseBtn" class="preview-btn">✕ إغلاق</button>
</div>
  </div>
  <div id="previewBody" class="preview-body"></div>
</div>

<script type="module" src="firebase-init.js"></script>
<script src="cloudinary-init.js"></script>
<script src="script.js" defer></script>
 
</body>
</html>
